<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login &mdash; ShoeMart</title>
    <link rel="shortcut icon" href="favicon.svg" type="image/x-icon" />

    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome for Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body
    class="relative bg-gray-50 flex min-h-screen items-center justify-center p-4"
  >
    <nav
      class="absolute top-0 left-0 w-full flex justify-between items-center p-8"
    >
      <a href="index.html" class="text-xl font-black text-gray-800">ShoeMart</a>

      <a
        href="index.html"
        class="text-sm font-semibold text-gray-600 hover:text-orange-600 transition-colors"
      >
        <i class="fa-solid fa-arrow-left-long mr-2"></i> Back to Store
      </a>
    </nav>
    <!-- Container Card -->
    <div
      class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden"
    >
      <!-- Top Branding Strip -->
      <div class="bg-orange-600 p-6 text-center text-white relative">
        <div
          class="absolute -top-10 -right-10 w-32 h-32 bg-orange-500 rounded-full blur-2xl opacity-50"
        ></div>
        <a
          href="index.html"
          class="text-3xl font-black tracking-tight hover:opacity-90 transition-opacity"
          >ShoeMart</a
        >
        <p class="text-orange-100 text-sm mt-1">
          Welcome back! Please sign in to your account.
        </p>
      </div>

      <!-- Form Core -->
      <form action="" class="p-8 space-y-6">
        <h2 class="text-2xl font-bold text-gray-800 text-center md:text-left">
          Login
        </h2>

        <!-- Email Input Group -->
        <div class="space-y-2">
          <label for="email" class="text-sm font-semibold text-gray-600 block"
            >Email Address</label
          >
          <div class="relative">
            <span
              class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"
            >
              <i class="fa-regular fa-envelope"></i>
            </span>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="example@gmail.com"
              class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 outline-none transition-all placeholder:text-gray-400 text-gray-800"
              required
            />
          </div>
        </div>

        <!-- Password Input Group -->
        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <label
              for="password"
              class="text-sm font-semibold text-gray-600 block"
              >Password</label
            >
            <a
              href="#"
              class="text-xs font-semibold text-orange-600 hover:text-orange-700 hover:underline"
              >Forgot Password?</a
            >
          </div>
          <div class="relative">
            <span
              class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"
            >
              <i class="fa-solid fa-lock"></i>
            </span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 outline-none transition-all placeholder:text-gray-400 text-gray-800"
              required
            />
          </div>
        </div>

        <!-- Remember Me & Checkbox -->
        <div class="flex items-center">
          <input
            type="checkbox"
            id="remember"
            class="w-4 h-4 rounded border-gray-300 text-orange-600 focus:ring-orange-500 accent-orange-600 cursor-pointer"
          />
          <label
            for="remember"
            class="ml-2 text-sm text-gray-600 select-none cursor-pointer"
            >Remember this device</label
          >
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="w-full py-3.5 rounded-xl bg-orange-600 hover:bg-orange-700 text-white font-bold transition-all duration-200 shadow-md hover:shadow-orange-600/20 transform hover:-translate-y-0.5 uppercase tracking-wide cursor-pointer"
        >
          Login
        </button>

        <!-- Divider for OAuth Options (Optional but fills design gap perfectly) -->
        <div class="relative flex py-2 items-center">
          <div class="flex-grow border-t border-gray-200"></div>
          <span
            class="flex-shrink mx-4 text-gray-400 text-xs uppercase tracking-wider"
            >or login with</span
          >
          <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <!-- Social Login Buttons -->
        <div class="grid grid-cols-2 gap-4">
          <button
            type="button"
            class="flex items-center justify-center gap-2 py-2.5 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors text-sm font-medium text-gray-700 cursor-pointer"
          >
            <i class="fa-brands fa-google text-red-500 text-base"></i> Google
          </button>
          <button
            type="button"
            class="flex items-center justify-center gap-2 py-2.5 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors text-sm font-medium text-gray-700 cursor-pointer"
          >
            <i class="fa-brands fa-facebook text-blue-600 text-base"></i>
            Facebook
          </button>
        </div>

        <!-- Footer Redirection -->
        <p class="text-sm text-gray-600 text-center pt-2">
          Don't have an account?
          <a
            href="register.html"
            class="text-orange-600 font-bold hover:text-orange-700 hover:underline"
            >Register here</a
          >
        </p>
      </form>
    </div>
  </body>
</html>
