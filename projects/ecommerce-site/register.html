<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register &mdash; ShoeMart</title>
    <link rel="shortcut icon" href="favicon.svg" type="image/x-icon" />

    <!-- Tailwind CSS v4 CDN -->
    <link href="style.css" rel="stylesheet" />
    <!-- Font Awesome for Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body
    class="bg-gray-50 flex min-h-screen items-center justify-center p-4 relative"
  >
    <nav
      class="absolute top-0 left-0 w-full flex justify-between items-center p-8"
    >
      <a href="index.html" class="text-xl font-black text-gray-800">ShoeMart</a>

      <a
        href="index.html"
        class="text-sm font-semibold text-gray-600 hover:text-orange-600 transition-colors"
      >
        <i class="fa-solid fa-arrow-left-long mr-2"></i> Back to Store
      </a>
    </nav>
    <!-- Container Card -->
    <div
      class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden my-8"
    >
      <!-- Top Branding Strip -->
      <div class="bg-orange-600 p-6 text-center text-white relative">
        <div
          class="absolute -top-10 -right-10 w-32 h-32 bg-orange-500 rounded-full blur-2xl opacity-50"
        ></div>
        <a
          href="index.html"
          class="text-3xl font-black tracking-tight hover:opacity-90 transition-opacity"
          >ShoeMart</a
        >
        <p class="text-orange-100 text-sm mt-1">
          Create an account to track orders and save deals!
        </p>
      </div>

      <!-- Form Core -->
      <form action="" class="p-8 space-y-5">
        <h2 class="text-2xl font-bold text-gray-800 text-center md:text-left">
          Register
        </h2>

        <!-- Full Name Input Group -->
        <div class="space-y-1">
          <label for="name" class="text-xs font-semibold text-gray-600 block"
            >Full Name</label
          >
          <div class="relative">
            <span
              class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"
            >
              <i class="fa-regular fa-user"></i>
            </span>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="John Doe"
              class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 outline-none transition-all placeholder:text-gray-400 text-gray-800 text-sm"
              required
            />
          </div>
        </div>

        <!-- Email Input Group -->
        <div class="space-y-1">
          <label for="email" class="text-xs font-semibold text-gray-600 block"
            >Email Address</label
          >
          <div class="relative">
            <span
              class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"
            >
              <i class="fa-regular fa-envelope"></i>
            </span>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="example@gmail.com"
              class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 outline-none transition-all placeholder:text-gray-400 text-gray-800 text-sm"
              required
            />
          </div>
        </div>

        <!-- Password Input Group -->
        <div class="space-y-1">
          <label
            for="password"
            class="text-xs font-semibold text-gray-600 block"
            >Password</label
          >
          <div class="relative">
            <span
              class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"
            >
              <i class="fa-solid fa-lock"></i>
            </span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Min. 8 characters"
              class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 outline-none transition-all placeholder:text-gray-400 text-gray-800 text-sm"
              required
            />
          </div>
        </div>

        <!-- Confirm Password Input Group -->
        <div class="space-y-1">
          <label
            for="confirm-password"
            class="text-xs font-semibold text-gray-600 block"
            >Confirm Password</label
          >
          <div class="relative">
            <span
              class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"
            >
              <i class="fa-solid fa-shield-halved"></i>
            </span>
            <input
              type="password"
              id="confirm-password"
              name="confirm-password"
              placeholder="Repeat your password"
              class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 outline-none transition-all placeholder:text-gray-400 text-gray-800 text-sm"
              required
            />
          </div>
        </div>

        <!-- Terms and Conditions Checkbox -->
        <div class="flex items-start pt-1">
          <input
            type="checkbox"
            id="terms"
            class="w-4 h-4 mt-0.5 rounded border-gray-300 text-orange-600 focus:ring-orange-500 accent-orange-600 cursor-pointer"
            required
          />
          <label
            for="terms"
            class="ml-2 text-xs text-gray-600 select-none cursor-pointer leading-tight"
          >
            I agree to the
            <a href="#" class="text-orange-600 font-semibold hover:underline"
              >Terms of Service</a
            >
            and
            <a href="#" class="text-orange-600 font-semibold hover:underline"
              >Privacy Policy</a
            >
          </label>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="w-full py-3 rounded-xl bg-orange-600 hover:bg-orange-700 text-white font-bold transition-all duration-200 shadow-md hover:shadow-orange-600/20 transform hover:-translate-y-0.5 uppercase tracking-wide text-sm cursor-pointer"
        >
          Create Account
        </button>

        <!-- Divider for OAuth Options -->
        <div class="relative flex py-1 items-center">
          <div class="flex-grow border-t border-gray-100"></div>
          <span
            class="flex-shrink mx-4 text-gray-400 text-xs uppercase tracking-wider"
            >Or register with</span
          >
          <div class="flex-grow border-t border-gray-100"></div>
        </div>

        <!-- Social Register Buttons -->
        <div class="grid grid-cols-2 gap-4">
          <button
            type="button"
            class="flex items-center justify-center gap-2 py-2 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors text-xs font-medium text-gray-700 cursor-pointer"
          >
            <i class="fa-brands fa-google text-red-500 text-sm"></i> Google
          </button>
          <button
            type="button"
            class="flex items-center justify-center gap-2 py-2 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors text-xs font-medium text-gray-700 cursor-pointer"
          >
            <i class="fa-brands fa-facebook text-blue-600 text-sm"></i> Facebook
          </button>
        </div>

        <!-- Footer Redirection -->
        <p class="text-sm text-gray-600 text-center pt-2">
          Already have an account?
          <a
            href="login.html"
            class="text-orange-600 font-bold hover:text-orange-700 hover:underline"
            >Login here</a
          >
        </p>
      </form>
    </div>
  </body>
</html>
